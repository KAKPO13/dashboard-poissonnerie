<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AquaDash - Creer votre compte</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFBF5;--surface:#FFF;--s2:#FFF5ED;--border:#E8E0D8;--orange:#FF6B1A;--odk:#E05510;--olt:#FFF0E8;--t1:#1A1A1A;--t2:#888880;--t3:#D0CBC4;--green:#2E7D32;--gbg:#EDF7ED;--red:#A32D2D;--rbg:#FCEBEB;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:grid;place-items:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 10% 10%,rgba(255,107,26,.06) 0%,transparent 60%);pointer-events:none}
.card{position:relative;z-index:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:40px;width:100%;max-width:540px;box-shadow:0 4px 24px rgba(255,107,26,.06);animation:up .4s ease both}
.card::before{content:'';position:absolute;top:0;left:20px;right:20px;height:3px;background:var(--orange);border-radius:0 0 3px 3px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-icon{width:40px;height:40px;background:var(--orange);border-radius:11px;display:grid;place-items:center;font-size:20px}
.logo h1{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800}
.logo h1 span{color:var(--orange)}
.sub{font-size:.82rem;color:var(--t2);margin-bottom:26px}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
@media(max-width:480px){.plans{grid-template-columns:1fr}}
.plan{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.plan:hover{border-color:var(--orange)}
.plan.sel{border-color:var(--orange);background:var(--olt)}
.plan-name{font-family:'Syne',sans-serif;font-size:.86rem;font-weight:700}
.plan-price{font-size:.7rem;color:var(--t2);margin-top:3px}
.plan-info{font-size:.67rem;color:var(--t2);margin-top:5px;line-height:1.5}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:500px){.fg{grid-template-columns:1fr}}
.ff{display:flex;flex-direction:column;gap:5px}
.ff.full{grid-column:1/-1}
.ff label{font-size:.72rem;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.03em}
.ff input{background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:10px 13px;outline:none;transition:border-color .2s}
.ff input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,26,.1)}
.btn{width:100%;padding:12px;background:var(--orange);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn:hover{background:var(--odk)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;margin-top:12px;padding:10px 14px;border-radius:9px;font-size:.82rem;font-weight:500;align-items:center;gap:8px}
.msg.ok{display:flex;background:var(--gbg);color:var(--green);border:1.5px solid rgba(46,125,50,.2)}
.msg.err{display:flex;background:var(--rbg);color:var(--red);border:1.5px solid rgba(163,45,45,.2)}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.lnk{text-align:center;margin-top:18px;font-size:.78rem;color:var(--t2)}
.lnk a{color:var(--orange);text-decoration:none;font-weight:500}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-icon">🐟</div><h1>Aqua<span>Dash</span></h1></div>
  <p class="sub">Creez votre espace poissonnerie</p>
  <div class="plans">
    <div class="plan sel" onclick="selectPlan('free',this)">
      <div class="plan-name">Gratuit</div>
      <div class="plan-price">0 FCFA/mois</div>
      <div class="plan-info">1 gerant · 3 employes · 50 produits</div>
    </div>
    <div class="plan" onclick="selectPlan('pro',this)">
      <div class="plan-name">Pro</div>
      <div class="plan-price">25 000 FCFA/mois</div>
      <div class="plan-info">5 gerants · 20 employes · Illimite</div>
    </div>
    <div class="plan" onclick="selectPlan('enterprise',this)">
      <div class="plan-name">Enterprise</div>
      <div class="plan-price">75 000 FCFA/mois</div>
      <div class="plan-info">Illimite · Support dedie</div>
    </div>
  </div>
  <div class="fg">
    <div class="ff full"><label>Nom de la societe</label><input id="nom_societe" type="text" placeholder="Poissonnerie Kouassi"/></div>
    <div class="ff"><label>Votre nom complet</label><input id="nom_admin" type="text" placeholder="Jean Kouassi"/></div>
    <div class="ff"><label>Telephone</label><input id="telephone" type="tel" placeholder="+225 07 00 00 00"/></div>
    <div class="ff"><label>Adresse e-mail</label><input id="email" type="email" placeholder="vous@societe.ci"/></div>
    <div class="ff"><label>Mot de passe</label><input id="password" type="password" placeholder="Min 8 caracteres"/></div>
  </div>
  <button class="btn" id="btn" onclick="doRegister()"><span id="btn-label">Creer mon espace</span></button>
  <div class="msg" id="msg"></div>
  <div class="lnk">Deja un compte ? <a href="login.html">Se connecter</a></div>
</div>
<script>
var selectedPlan="free";
function selectPlan(plan,el){
  selectedPlan=plan;
  document.querySelectorAll(".plan").forEach(function(c){c.classList.remove("sel");});
  el.classList.add("sel");
}
async function doRegister(){
  var nom_societe=document.getElementById("nom_societe").value.trim();
  var nom_admin=document.getElementById("nom_admin").value.trim();
  var telephone=document.getElementById("telephone").value.trim();
  var email=document.getElementById("email").value.trim();
  var password=document.getElementById("password").value;
  var btn=document.getElementById("btn");
  var label=document.getElementById("btn-label");
  var msg=document.getElementById("msg"); msg.className="msg";
  if(!nom_societe||!nom_admin||!email||!password){showMsg("err","Veuillez remplir tous les champs.");return;}
  if(password.length<8){showMsg("err","Mot de passe trop court (min 8 caracteres).");return;}
  btn.disabled=true; label.innerHTML='<span class="spinner"></span> Creation...';
  try{
    var res=await fetch("/.netlify/functions/auth-register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nom_societe:nom_societe,nom_admin:nom_admin,telephone:telephone,email:email,password:password,plan:selectedPlan})});
    var data=await res.json();
    if(!res.ok||data.error) throw new Error(data.error||"Erreur inscription");
    showMsg("ok","Compte cree ! Redirection...");
    setTimeout(function(){window.location.href="login.html";},2000);
  }catch(err){
    showMsg("err","Erreur : "+err.message);
    btn.disabled=false; label.textContent="Creer mon espace";
  }
}
function showMsg(type,text){var m=document.getElementById("msg");m.className="msg "+type;m.textContent=text;}
document.addEventListener("keydown",function(e){if(e.key==="Enter")doRegister();});
</script>
</body>
</html>
